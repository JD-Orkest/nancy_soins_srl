name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Le script s'exécute uniquement quand vous envoyez du code sur 'main'

# Autorise le script à publier du contenu sur votre dépôt GitHub (Nouveau commit)
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Utilise la version 22 stable que nous avons configurée ensemble

      - name: Install dependencies 🔧
        run: npm ci

      - name: Generate Static Site 🚀
        run: npx nuxi generate # Commande Nuxt pour compiler le site en HTML/CSS pur

      - name: Deploy to GitHub Pages 🌍
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .output/public # Le dossier généré automatiquement par Nuxt 4